name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  node:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: audio
          POSTGRES_PASSWORD: audio
          POSTGRES_DB: audio
        ports: ["5432:5432"]
        options: --health-cmd "pg_isready -U audio" --health-interval 5s --health-retries 10
    env:
      DATABASE_URL: postgres://audio:audio@localhost:5432/audio
      NATS_URL: nats://localhost:4222
      OBJECT_STORE_ENDPOINT: http://localhost:9000
      OBJECT_STORE_BUCKET: audio-api
      OBJECT_STORE_ACCESS_KEY: audioadmin
      OBJECT_STORE_SECRET_KEY: audioadminpw
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: for f in infra/migrations/*.sql; do echo "applying $f"; psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$f"; done
      # NATS service containers can't override the image command, so JetStream (-js)
      # is started here via docker run, then streams are bootstrapped (mirrors infra/docker-compose.yml).
      - name: Start NATS (JetStream)
        run: docker run -d --name nats -p 4222:4222 -p 8222:8222 nats:2.10-alpine -js -m 8222
      - name: Wait for NATS and bootstrap streams
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8222/healthz >/dev/null 2>&1; then echo "nats up"; break; fi
            echo "waiting for nats..."; sleep 1
          done
          docker run --rm --network host -e NATS_URL=nats://localhost:4222 \
            -v "$PWD/infra/nats/bootstrap-streams.sh:/bootstrap.sh:ro" \
            natsio/nats-box:latest sh /bootstrap.sh
      # MinIO needs a custom `server /data` command, which service containers can't
      # override, so it's started here via docker run then the bucket is created
      # (mirrors the minio + minio-bootstrap services in infra/docker-compose.yml).
      - name: Start MinIO (object store)
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=audioadmin -e MINIO_ROOT_PASSWORD=audioadminpw \
            minio/minio:latest server /data
      - name: Wait for MinIO and create bucket
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:9000/minio/health/ready >/dev/null 2>&1; then echo "minio up"; break; fi
            echo "waiting for minio..."; sleep 1
          done
          docker run --rm --network host minio/mc:latest sh -c \
            "mc alias set local http://localhost:9000 audioadmin audioadminpw && mc mb --ignore-existing local/audio-api"
      # build before typecheck so cross-package dist/*.d.ts is populated for downstream tsc
      - run: pnpm -r build
      - run: pnpm -r typecheck
      - run: pnpm -r test

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with: { python-version: "3.12" }
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - run: pip install -e "packages/py-common[dev]"
      - run: ffmpeg -y -f lavfi -i "sine=frequency=440:duration=5" -ac 2 -ar 48000 tests/fixtures/audio/sample-stereo.wav
      - run: cd services/worker-format && pip install -e ".[dev]" && pytest -q
