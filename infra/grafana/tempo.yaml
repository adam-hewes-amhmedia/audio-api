server:
  http_listen_port: 3200
distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
storage:
  trace:
    backend: local
    local:
      path: /tmp/tempo

# Derive RED span metrics (call counts + latency histograms, labelled by
# service / span_name / span_kind / status_code) from incoming traces and
# remote_write them to Prometheus. This is what populates the throughput,
# error-rate and latency dashboards -- Prometheus has no scrape target of its
# own for these.
metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /tmp/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true

# Enable the generator processors for the (single, local) tenant.
overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]
