name: audio-api
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: audio
      POSTGRES_PASSWORD: audio
      POSTGRES_DB: audio
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audio"]
      interval: 5s
      retries: 10

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    environment:
      PGPASSWORD: audio
    entrypoint: ["sh", "-c"]
    command:
      - "for f in /migrations/*.sql; do echo applying $$f; psql -h postgres -U audio -d audio -v ON_ERROR_STOP=1 -f $$f; done"

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data"]
    ports: ["4222:4222", "8222:8222"]
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/varz"]
      interval: 5s
      retries: 10

  nats-bootstrap:
    image: natsio/nats-box:latest
    depends_on:
      nats:
        condition: service_healthy
    environment:
      NATS_URL: nats://nats:4222
    volumes:
      - ./nats/bootstrap-streams.sh:/bootstrap.sh:ro
    entrypoint: ["sh", "/bootstrap.sh"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: audioadmin
      MINIO_ROOT_PASSWORD: audioadminpw
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      retries: 10

  minio-bootstrap:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command:
      - >
        mc alias set local http://minio:9000 audioadmin audioadminpw &&
        mc mb --ignore-existing local/audio-api

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel/collector-config.yaml:/etc/otel/config.yaml:ro
    ports: ["4317:4317", "4318:4318"]
    depends_on: [tempo, loki]

  tempo:
    image: grafana/tempo:2.4.0
    command: ["-config.file=/etc/tempo.yaml"]
    ports: ["3200:3200"]
    volumes:
      - ./grafana/tempo.yaml:/etc/tempo.yaml:ro

  loki:
    image: grafana/loki:2.9.0
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports: ["3100:3100"]

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    ports: ["3000:3000"]
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

  api-gateway:
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    env_file: ../.env
    environment:
      OTEL_SERVICE_NAME: api-gateway
    ports: ["8080:8080"]

  orchestrator:
    build:
      context: ..
      dockerfile: services/orchestrator/Dockerfile
    depends_on: [postgres, nats, minio]
    env_file: ../.env
    environment:
      OTEL_SERVICE_NAME: orchestrator

  aggregator:
    build:
      context: ..
      dockerfile: services/aggregator/Dockerfile
    depends_on: [postgres, nats, minio]
    env_file: ../.env
    environment:
      OTEL_SERVICE_NAME: aggregator

  worker-fetcher:
    build:
      context: ..
      dockerfile: services/worker-fetcher/Dockerfile
    depends_on: [nats, minio]
    env_file: ../.env
    environment:
      OTEL_SERVICE_NAME: worker-fetcher

  worker-format:
    build:
      context: ..
      dockerfile: services/worker-format/Dockerfile
    depends_on: [nats, minio]
    env_file: ../.env
    environment:
      OTEL_SERVICE_NAME: worker-format

volumes:
  pgdata:
  natsdata:
  miniodata:
