name: audio-api
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: audio
      POSTGRES_PASSWORD: audio
      POSTGRES_DB: audio
    ports: ["5432:5432"]
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U audio"]
      interval: 5s
      retries: 10

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations:ro
    environment:
      PGPASSWORD: audio
    entrypoint: ["sh", "-c"]
    command:
      - "for f in /migrations/*.sql; do echo applying $$f; psql -h postgres -U audio -d audio -v ON_ERROR_STOP=1 -f $$f; done"

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data", "-m", "8222"]
    ports: ["4222:4222", "8222:8222"]
    volumes:
      - natsdata:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/varz"]
      interval: 5s
      retries: 10

  nats-bootstrap:
    image: natsio/nats-box:latest
    depends_on:
      nats:
        condition: service_healthy
    environment:
      NATS_URL: nats://nats:4222
    volumes:
      - ./nats/bootstrap-streams.sh:/bootstrap.sh:ro
    entrypoint: ["sh", "/bootstrap.sh"]

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: audioadmin
      MINIO_ROOT_PASSWORD: audioadminpw
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      retries: 10

  minio-bootstrap:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["sh", "-c"]
    command:
      - >
        mc alias set local http://minio:9000 audioadmin audioadminpw &&
        mc mb --ignore-existing local/audio-api

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.96.0
    command: ["--config=/etc/otel/config.yaml"]
    volumes:
      - ./otel/collector-config.yaml:/etc/otel/config.yaml:ro
    ports: ["4317:4317", "4318:4318"]
    depends_on: [tempo, loki]

  tempo:
    image: grafana/tempo:2.4.0
    command: ["-config.file=/etc/tempo.yaml"]
    ports: ["3200:3200"]
    volumes:
      - ./grafana/tempo.yaml:/etc/tempo.yaml:ro
    depends_on: [prometheus]

  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--web.enable-remote-write-receiver"
      - "--enable-feature=exemplar-storage"
    ports: ["9090:9090"]
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus

  loki:
    image: grafana/loki:2.9.0
    command: ["-config.file=/etc/loki/local-config.yaml"]
    ports: ["3100:3100"]

  grafana:
    image: grafana/grafana:10.4.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
    ports: ["3000:3000"]
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on: [prometheus, tempo, loki]

  api-gateway:
    build:
      context: ..
      dockerfile: services/api-gateway/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      nats-bootstrap:
        condition: service_completed_successfully
      minio-bootstrap:
        condition: service_completed_successfully
    env_file: ../.env
    environment:
      OTEL_SERVICE_NAME: api-gateway
    ports: ["8080:8080"]

  orchestrator:
    build:
      context: ..
      dockerfile: services/orchestrator/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      nats-bootstrap:
        condition: service_completed_successfully
      minio-bootstrap:
        condition: service_completed_successfully
    env_file: ../.env
    environment:
      OTEL_SERVICE_NAME: orchestrator

  worker-fetcher:
    build:
      context: ..
      dockerfile: services/worker-fetcher/Dockerfile
    depends_on:
      nats-bootstrap:
        condition: service_completed_successfully
      minio-bootstrap:
        condition: service_completed_successfully
    env_file: ../.env
    environment:
      OTEL_SERVICE_NAME: worker-fetcher

  worker-format:
    build:
      context: ..
      dockerfile: services/worker-format/Dockerfile
    depends_on:
      nats-bootstrap:
        condition: service_completed_successfully
      minio-bootstrap:
        condition: service_completed_successfully
    env_file: ../.env
    environment:
      OTEL_SERVICE_NAME: worker-format

  worker-vad:
    build:
      context: ..
      dockerfile: services/worker-vad/Dockerfile
    depends_on:
      nats-bootstrap:
        condition: service_completed_successfully
      minio-bootstrap:
        condition: service_completed_successfully
    env_file: ../.env
    environment:
      OTEL_SERVICE_NAME: worker-vad

  worker-webhook:
    build:
      context: ..
      dockerfile: services/worker-webhook/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      nats-bootstrap:
        condition: service_completed_successfully
    env_file: ../.env
    environment:
      OTEL_SERVICE_NAME: worker-webhook
      PUBLIC_API_URL: http://localhost:8080

  worker-tt-archiver:
    build:
      context: ..
      dockerfile: services/worker-tt-archiver/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      nats-bootstrap:
        condition: service_completed_successfully
      minio-bootstrap:
        condition: service_completed_successfully
    env_file: ../.env
    environment:
      OTEL_SERVICE_NAME: worker-tt-archiver

  worker-language:
    build:
      context: ..
      dockerfile: services/worker-language/Dockerfile
    depends_on:
      nats-bootstrap:
        condition: service_completed_successfully
      minio-bootstrap:
        condition: service_completed_successfully
    env_file: ../.env
    environment:
      OTEL_SERVICE_NAME: worker-language

  worker-dme-classify:
    build:
      context: ..
      dockerfile: services/worker-dme-classify/Dockerfile
    depends_on:
      nats-bootstrap:
        condition: service_completed_successfully
      minio-bootstrap:
        condition: service_completed_successfully
    env_file: ../.env
    environment:
      OTEL_SERVICE_NAME: worker-dme-classify

  worker-stream-pod:
    build:
      context: ..
      dockerfile: services/worker-stream-pod/Dockerfile
    profiles: [build-only]

  worker-stream-supervisor:
    build:
      context: ..
      dockerfile: services/worker-stream-supervisor/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      nats-bootstrap:
        condition: service_completed_successfully
      minio-bootstrap:
        condition: service_completed_successfully
    env_file: ../.env
    environment:
      OTEL_SERVICE_NAME: worker-stream-supervisor
      STREAM_WS_HOST: worker-stream-supervisor
      STREAM_WS_PORT_START: "10000"
      STREAM_WS_PORT_END:   "10009"
      STREAM_MAX_PODS: "4"
      STREAM_POD_CMD: "python -m worker_stream_pod"
      # Pod tuning (inherited by the forked pod). CPU-friendly defaults for the
      # POC; bump POD_MODEL_SIZE + WHISPER_DEVICE=cuda on a GPU host.
      WHISPER_DEVICE: cpu
      WHISPER_COMPUTE_TYPE: int8
      POD_MODEL_SIZE: small
      POD_MAX_DURATION_S: "30"
      # Interim re-infer is a GPU-budget feature; on CPU it multiplies inference
      # cost, so the POC runs finalised-only (effectively disables interim).
      POD_INTERIM_INTERVAL_MS: "600000"
      # CPU inference is slow; give the heartbeat reaper generous margin so a
      # healthy-but-busy pod isn't reaped. (Inference also runs off the event
      # loop now, so the heartbeat keeps flowing regardless.)
      STREAM_POD_STALE_AFTER_S: "120"
      # Inbound media for srt listener sources, one port per stream. Must match
      # the published range below.
      STREAM_INGEST_PORT_START: "9100"
      STREAM_INGEST_PORT_END:   "9109"
    volumes:
      - modelcache:/models
    # The WS fan-out and caption SRT ranges stay inside the docker network: pods
    # pull source URLs outbound, and the gateway proxies cues out. The exception
    # is srt listener ingest, where a client's encoder pushes to us, so that
    # range alone is published. SRT is UDP; a tcp mapping here silently drops
    # every handshake. Only 10 listener streams can run at once, and
    # STREAM_MAX_PODS caps it at 4 before that bites: an abandoned listener holds
    # its pod for POD_INGEST_WAIT_S, so a few of them wedge new streams.
    ports: ["9100-9109:9100-9109/udp"]

volumes:
  pgdata:
  natsdata:
  miniodata:
  promdata:
  modelcache:
